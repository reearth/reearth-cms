name: ci-server
on:
  workflow_call:

jobs:
  ci-server-lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            golangci-lint.run:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
      - name: checkout
        uses: actions/checkout@v6
      - name: go setup
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          check-latest: true
          cache-dependency-path: 'server/go.sum'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: server
          args: --config=../.golangci.yml
          skip-cache: true
      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
        working-directory: server
      - name: Check gql generation
        working-directory: server
        run: |
          go generate ./internal/adapter/gql
          git diff --exit-code ./internal/adapter/gql
      - name: Check go fmt
        working-directory: server
        run: |
          go fmt ./
          git diff --exit-code ./
  ci-server-i18n:
    name: i18n
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            sum.golang.org:443
      - name: checkout
        uses: actions/checkout@v6
      - name: go setup
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          check-latest: true
          cache-dependency-path: 'server/go.sum'
      - name: check forgotten translations
        working-directory: server
        run: make i18n-ci
  ci-server-test:
    name: test
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6-focal
        ports:
          - 27017:27017
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            cli.codecov.io:443
            github.com:443
            ingest.codecov.io:443
            keybase.io:443
            o26192.ingest.us.sentry.io:443
            proxy.golang.org:443
            reearth-dev.auth0.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
      - name: checkout
        uses: actions/checkout@v6
      - name: go setup
        uses: actions/setup-go@v6
        with:
          go-version-file: 'server/go.mod'
          check-latest: true
          cache-dependency-path: 'server/go.sum'
      - name: test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic -timeout 10m ./...
        working-directory: server
        env:
          REEARTH_CMS_DB: mongodb://localhost
      - name: Send coverage report
        uses: codecov/codecov-action@v7
        with:
          flags: server
          files: coverage.txt
