name: Web E2E test
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch"
        required: false
        default: "main"
      smoke_only:
        description: "Run smoke tests only"
        type: boolean
        required: false
        default: false
      shard_count:
        description: "Number of shards for parallel test execution"
        type: number
        required: false
        default: 2
      slowmo_ms:
        description: "Playwright slowMo in milliseconds"
        type: number
        required: false
        default: 300
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_call:
    inputs:
      api_url:
        required: true
        type: string
      base_url:
        required: true
        type: string
      branch:
        required: true
        type: string
      use_iap:
        description: "Enable IAP authentication"
        required: false
        type: boolean
        default: false
      iap_target_audience:
        description: "IAP OAuth client ID"
        required: false
        type: string
        default: ""
      token_format:
        description: "Token format for authentication"
        required: false
        type: string
        default: "id-token"
      smoke_only:
        description: "Run smoke tests only"
        type: boolean
        required: false
        default: false
    secrets:
      REEARTH_WEB_E2E_USERNAME:
        required: true
      REEARTH_WEB_E2E_PASSWORD:
        required: true
      GC_WORKLOAD_IDENTITY_PROVIDER:
        description: "Workload Identity Federation provider"
        required: false
env:
  REEARTH_CMS_API: ${{ inputs.api_url || vars.REEARTH_CMS_API }}
  REEARTH_CMS_E2E_BASEURL: ${{ inputs.base_url || vars.REEARTH_CMS_E2E_BASEURL }}
  REEARTH_CMS_E2E_USERNAME: ${{ secrets.REEARTH_WEB_E2E_USERNAME }}
  REEARTH_CMS_E2E_PASSWORD: ${{ secrets.REEARTH_WEB_E2E_PASSWORD }}
jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.params.outputs.matrix }}
      shard_total: ${{ steps.params.outputs.total }}
      slowmo_ms: ${{ steps.params.outputs.slowmo_ms }}
    steps:
      - name: Validate and resolve parameters
        id: params
        run: |
          shard_count=${{ inputs.shard_count || 2 }}
          slowmo_ms=${{ inputs.slowmo_ms || 300 }}

          if ! echo "$shard_count" | grep -qE '^[1-9][0-9]*$'; then
            echo "::warning::shard_count must be a positive integer, got '$shard_count'. Using default: 2"
            shard_count=2
          fi

          if ! echo "$slowmo_ms" | grep -qE '^[0-9]+$' || [ "$slowmo_ms" -lt 0 ] 2>/dev/null; then
            echo "::warning::slowmo_ms must be a non-negative integer, got '$slowmo_ms'. Using default: 300"
            slowmo_ms=300
          fi

          matrix=$(seq 1 "$shard_count" | jq -R 'tonumber' | jq -sc '.')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "total=$shard_count" >> "$GITHUB_OUTPUT"
          echo "slowmo_ms=$slowmo_ms" >> "$GITHUB_OUTPUT"
  e2e:
    name: playwright (${{ matrix.shard }})
    needs: setup
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: true
      matrix:
        shard: ${{ fromJSON(needs.setup.outputs.shard_matrix) }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          repository: reearth/reearth-cms
          ref: ${{ inputs.branch || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: "**/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$( node -e "console.log(require('@playwright/test/package.json').version)" )" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: "${{ runner.os }}-${{ runner.arch }}-playwright-chromium-${{ steps.playwright-version.outputs.version }}"
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-playwright-chromium-
      - name: Install Playwright system dependencies and browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium
      - name: Authenticate to Google Cloud
        id: auth
        if: ${{ inputs.use_iap }}
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GC_WORKLOAD_IDENTITY_PROVIDER }}
          token_format: ${{ inputs.token_format }}
          id_token_audience: ${{ inputs.iap_target_audience }}
          id_token_include_email: true
      - name: Verify IAP Authentication
        if: ${{ inputs.use_iap }}
        run: |
          if [ -z "${{ steps.auth.outputs.id_token }}" ] && [ -z "${{ steps.auth.outputs.access_token }}" ]; then
            echo "Failed to generate authentication token"
            exit 1
          else
            echo "Authentication token generated successfully"
          fi
      - name: Echo info
        run: |
          echo "REEARTH_CMS_API is $REEARTH_CMS_API"
          echo "REEARTH_CMS_E2E_BASEURL is $REEARTH_CMS_E2E_BASEURL"
          echo "REEARTH_CMS_E2E_USERNAME is $REEARTH_CMS_E2E_USERNAME"
      - name: Run Playwright tests
        timeout-minutes: 120
        env:
          USE_IAP_AUTH: ${{ inputs.use_iap || false }}
          IAP_AUTH_METHOD: ${{ inputs.token_format || 'id-token' }}
          IAP_ID_TOKEN: ${{ steps.auth.outputs.id_token }}
          PLAYWRIGHT_SLOW_MO: ${{ needs.setup.outputs.slowmo_ms }}
        run: ${{ inputs.smoke_only && 'yarn e2e-smoke' || 'yarn e2e' }} --shard=${{ matrix.shard }}/${{ needs.setup.outputs.shard_total }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: web/blob-report/
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.shard }}
          path: web/test-results/
          retention-days: 7
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gql-error-log-${{ matrix.shard }}
          path: web/e2e/gql-errors.log
          if-no-files-found: ignore
          retention-days: 7
  merge-reports:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          repository: reearth/reearth-cms
          ref: ${{ inputs.branch || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: "**/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - uses: actions/download-artifact@v7
        with:
          path: web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge reports
        run: |
          if [ -d "./all-blob-reports" ] && [ "$(ls -A ./all-blob-reports)" ]; then
            npx playwright merge-reports --reporter=github ./all-blob-reports
          else
            echo "No blob reports found, skipping merge"
          fi
