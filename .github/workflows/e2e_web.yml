name: Web E2E test
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch"
        required: false
        default: "main"
      smoke_only:
        description: "Run smoke tests only"
        type: boolean
        required: false
        default: false
      test_suite:
        description: "Test suite to run"
        type: choice
        required: false
        default: "full"
        options:
          - full
          - fast
          - smoke
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_call:
    inputs:
      api_url:
        required: true
        type: string
      base_url:
        required: true
        type: string
      branch:
        required: true
        type: string
      use_iap:
        description: "Enable IAP authentication"
        required: false
        type: boolean
        default: false
      iap_target_audience:
        description: "IAP OAuth client ID"
        required: false
        type: string
        default: ""
      token_format:
        description: "Token format for authentication"
        required: false
        type: string
        default: "id-token"
      smoke_only:
        description: "Run smoke tests only"
        type: boolean
        required: false
        default: false
    secrets:
      REEARTH_WEB_E2E_USERNAME:
        required: true
      REEARTH_WEB_E2E_PASSWORD:
        required: true
      GC_WORKLOAD_IDENTITY_PROVIDER:
        description: "Workload Identity Federation provider"
        required: false
env:
  REEARTH_CMS_API: ${{ inputs.api_url || vars.REEARTH_CMS_API }}
  REEARTH_CMS_E2E_BASEURL: ${{ inputs.base_url || vars.REEARTH_CMS_E2E_BASEURL }}
  REEARTH_CMS_E2E_USERNAME: ${{ secrets.REEARTH_WEB_E2E_USERNAME }}
  REEARTH_CMS_E2E_PASSWORD: ${{ secrets.REEARTH_WEB_E2E_PASSWORD }}
jobs:
  e2e:
    name: playwright (${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          repository: reearth/reearth-cms
          ref: ${{ inputs.branch || 'main' }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: "**/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$( node -e "console.log(require('@playwright/test/package.json').version)" )" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: "${{ runner.os }}-playwright-chromium-${{ steps.playwright-version.outputs.version }}"
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - name: Install Playwright system dependencies and browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium
      - name: Authenticate to Google Cloud
        id: auth
        if: ${{ inputs.use_iap }}
        uses: google-github-actions/auth@v3
        with:
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ secrets.GC_WORKLOAD_IDENTITY_PROVIDER }}
          token_format: ${{ inputs.token_format }}
          id_token_audience: ${{ inputs.iap_target_audience }}
          id_token_include_email: true
      - name: Verify IAP Authentication
        if: ${{ inputs.use_iap }}
        run: |
          if [ -z "${{ steps.auth.outputs.id_token }}" ] && [ -z "${{ steps.auth.outputs.access_token }}" ]; then
            echo "Failed to generate authentication token"
            exit 1
          else
            echo "Authentication token generated successfully"
          fi
      - name: Echo info
        run: |
          echo "REEARTH_CMS_API is $REEARTH_CMS_API"
          echo "REEARTH_CMS_E2E_BASEURL is $REEARTH_CMS_E2E_BASEURL"
          echo "REEARTH_CMS_E2E_USERNAME is $REEARTH_CMS_E2E_USERNAME"
      - name: Determine test command
        id: test-cmd
        run: |
          SUITE="${{ inputs.test_suite || 'full' }}"
          SMOKE="${{ inputs.smoke_only }}"
          if [ "$SMOKE" = "true" ] || [ "$SUITE" = "smoke" ]; then
            echo "cmd=yarn e2e-smoke" >> $GITHUB_OUTPUT
            echo "skip_shard=true" >> $GITHUB_OUTPUT
          elif [ "$SUITE" = "fast" ]; then
            echo "cmd=yarn e2e-fast --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}" >> $GITHUB_OUTPUT
            echo "skip_shard=false" >> $GITHUB_OUTPUT
          else
            echo "cmd=yarn e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}" >> $GITHUB_OUTPUT
            echo "skip_shard=false" >> $GITHUB_OUTPUT
          fi
      - name: Run Playwright tests
        if: steps.test-cmd.outputs.skip_shard == 'false' || matrix.shardIndex == 1
        timeout-minutes: 120
        env:
          USE_IAP_AUTH: ${{ inputs.use_iap || false }}
          IAP_AUTH_METHOD: ${{ inputs.token_format || 'id-token' }}
          IAP_ID_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: ${{ steps.test-cmd.outputs.cmd }}
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: web/blob-report/
          retention-days: 7
      - uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.shardIndex }}
          path: web/test-results/
          retention-days: 7

  merge-reports:
    name: Merge reports
    if: always() && !cancelled()
    needs: [e2e]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
        with:
          repository: reearth/reearth-cms
          ref: ${{ inputs.branch || 'main' }}
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: yarn
          cache-dependency-path: "**/yarn.lock"
      - name: Install dependencies
        run: yarn install
      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          path: web/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge reports
        run: yarn playwright merge-reports --reporter=html ./all-blob-reports
      - uses: actions/upload-artifact@v6
        with:
          name: html-report
          path: web/playwright-report/
          retention-days: 14
